baseURL = "https://lorainemg.github.io/"
languageCode = "en-us"
title = "Loraine Monteagudo"
theme = "indigo-night"

[taxonomies]
  skill = "skills"

[params]
  tagline = "Software Engineer specializing in FullStack development, Machine Learning and Data Analysis."
  location = "Tampa, Florida"
  cvPath = ""   # set to e.g. "files/loraine-monteagudo-cv.pdf" when the PDF exists
  [params.hero]
    eyebrow = "// fullstack engineer · machine learning"
    headline = "I build systems that track, *learn* and ship."   # *word* gets the gradient
    intro = "I'm **Loraine Monteagudo**, a software engineer working across **Python backends**, **Vue & Svelte frontends**, **ML models**, and **Data Analysis**."
  [params.social]
    github = "https://github.com/lorainemg"
    linkedin = "https://www.linkedin.com/in/lorainemg"
    email = "lorainemonteagudo@gmail.com"
  
[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
[outputs]
  home = ["html"]
  section = ["html"]
  taxonomy = ["html"]
  term = ["html"]

[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'
