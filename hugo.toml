baseURL = "https://lorainemg.github.io/"
languageCode = "en-us"
title = "Loraine Monteagudo"
theme = "indigo-night"

[taxonomies]
  skill = "skills"

[params]
  tagline = "Fullstack engineer with a machine learning background, building products end to end."
  location = "Tampa, Florida"
  cvPath = ""   # set to e.g. "files/loraine-monteagudo-cv.pdf" when the PDF exists
  [params.hero]
    eyebrow = "// fullstack engineer · machine learning"
    headline = "I build the *whole* product."   # *word* gets the gradient
    intro = "I'm **Loraine Monteagudo**, a fullstack engineer with a machine learning background. I take products from idea to production: the interface, the API, the data pipelines, and the infrastructure they run on."
  [params.social]
    github = "https://github.com/lorainemg"
    linkedin = "https://www.linkedin.com/in/lorainemg"
    email = "lorainemonteagudo@gmail.com"
  
[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
[outputs]
  home = ["html"]
  section = ["html"]
  taxonomy = ["html"]
  term = ["html"]

[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'
